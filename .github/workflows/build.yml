name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit

jobs:
  build_push:
    name: Build and push ${{ matrix.image_name }}
    runs-on: ubuntu-24.04

    # O bloco "concurrency" precisa estar AQUI (nível do job), não lá no
    # topo do arquivo — é só dentro de um job com "strategy.matrix" que o
    # contexto "matrix.*" existe de verdade. No nível do workflow (fora de
    # qualquer job) ele simplesmente não é reconhecido, e quebra o parse
    # do arquivo inteiro (foi exatamente o erro que você recebeu).
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ matrix.image_name }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write

    # -------------------------------------------------------------------------
    # Matriz: um único agendamento/gatilho gera as DUAS imagens, cada uma lendo
    # seu próprio Containerfile. Isso resolve o problema do "schedule" do
    # GitHub Actions só olhar a branch main — como as duas imagens são
    # construídas a partir da main, as duas recebem o build diário.
    #
    # Para adicionar uma terceira variante no futuro, é só acrescentar mais um
    # item na lista abaixo — nenhuma outra parte do workflow precisa mudar.
    # -------------------------------------------------------------------------
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: aurora-custom-gpteixeira
            containerfile: Containerfile
            image_description: >-
              Imagem Aurora customizada para gaming, desenvolvimento e utilitários de sistema
          - image_name: bazzite-gabriel
            containerfile: Containerfile.bazzite
            image_description: >-
              Imagem Bazzite customizada para desenvolvimento e utilitários de sistema

    steps:
      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 #v4.0.0

      - name: Check Just Syntax
        shell: bash
        run: |
          just check

      - name: Validate build inputs
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ matrix.containerfile }}"
          for file in \
            DarkPastels.colorscheme \
            Gabriel.profile \
            fastfetch-config.jsonc \
            deepcool-cli.service \
            primeiro-boot-por-maquina.sh \
            first-boot-launcher.sh \
            gabriel-first-boot.desktop; do
            test -f "${file}" || { echo "Required build file missing: ${file}" >&2; exit 1; }
          done
          bash -n primeiro-boot-por-maquina.sh first-boot-launcher.sh

      - name: Image Name
        id: image-name
        run: |
          # Antes: IMAGE_NAME=$(just image_name) — lia um único valor fixo do
          # image-template.env. Agora usamos o nome da matriz diretamente,
          # já que cada leg da matriz tem seu próprio nome de imagem.
          echo "IMAGE_NAME=${{ matrix.image_name }}" >> $GITHUB_ENV

      - name: Default Tag
        id: gen-default-tag
        run: |
          DEFAULT_TAG=$(just generate-default-tag)

          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> $GITHUB_ENV

      - name: Prepare environment
        run: |
          # Lowercase the image uri https://github.com/macbre/push-to-ghcr/issues/12
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      # This actually builds the container image
      - name: Build Image
        id: build-image
        run: |
          set -euo pipefail
          sudo -E "$(command -v just)" build \
            "${IMAGE_NAME}" \
            "${DEFAULT_TAG}" \
            "${{ matrix.containerfile }}" \
            "${{ matrix.image_description }}"

      - name: Verify built image
        shell: bash
        run: |
          set -euo pipefail
          sudo -E podman image exists "${IMAGE_NAME}:${DEFAULT_TAG}"
          sudo -E podman image inspect "${IMAGE_NAME}:${DEFAULT_TAG}" >/dev/null

      # This is optional, this provides smaller delta updates.
      # DESATIVADO: bug de compatibilidade entre containers-storage e
      # overlayfs aninhado (container rodando dentro de container) nesse
      # ambiente de CI especificamente — não afeta a corretude da imagem
      # final, só o tamanho das atualizações futuras. Ver discussão
      # relacionada em https://github.com/coreos/rpm-ostree/issues/4283
      # - name: Rechunk with rpm-ostree
      #   id: rechunk
      #   run: |
      #     sudo -E $(command -v just) ostree-rechunk \
      #       ${IMAGE_NAME} \
      #       ${DEFAULT_TAG}

      # If you are feeling adventurous, use the new distro agnostic rechunker
      # https://github.com/coreos/chunkah
      # You can delete the Rechunk with rpm-ostree portion then if you use this
      #- name: Rechunk with Chunkah
      #  id: rechunk
      #  run: |
      #    sudo -E $(command -v just) rechunk \
      #      ${IMAGE_NAME} \
      #      ${DEFAULT_TAG}

      - name: Generate Build Tags
        id: gen-build-tags
        run: |
          alias_tags="$(just generate-build-tags \
                        ${IMAGE_NAME} \
                        ${DEFAULT_TAG})"

          echo "Tags for this Action..."
          echo "${alias_tags}"
          echo "alias_tags=${alias_tags}" >> $GITHUB_OUTPUT

      - name: Tag Image
        id: tag-images
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          sudo -E "$(command -v just)" tag-images \
            "${IMAGE_NAME}" \
            "${DEFAULT_TAG}" \
            "${ALIAS_TAGS}"

      # These `if` statements are so that pull requests for your custom images do not make it publish any packages under your name without you knowing
      # They also check if the runner is on the default branch so that things like the merge queue (if you enable it), are going to work
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push-image
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          set -euox pipefail
          for tag in ${ALIAS_TAGS}; do
            sudo -E podman push \
              --digestfile=/tmp/digestfile \
              "${IMAGE_NAME}:${tag}" \
              "${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}"
          done

          digest=$(< /tmp/digestfile)

          echo "digest=${digest}" >> $GITHUB_OUTPUT

      # This section is optional and only needs to be enabled if you plan on distributing
      # your project for others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        # https://github.com/containers/container-libs/issues/388
        with:
          cosign-release: 'v2.6.3'

      - name: Sign container image
        id: sign-image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"
